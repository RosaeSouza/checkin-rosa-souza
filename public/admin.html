<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Administrativo</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body{
  font-family:Poppins, sans-serif;
  background:#f4f6f9;
  padding:20px;
}
h1{
  text-align:center;
}
table{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
}
th, td{
  padding:10px;
  border-bottom:1px solid #ddd;
  font-size:14px;
}
th{
  background:#2c5364;
  color:white;
}
tr:hover{
  background:#f1f1f1;
}
</style>
</head>
<body>

<h1>ROSA & SOUZA ADMINISTRADORA DE BENS</h1>
<h2>Painel de Check-ins</h2>

<table id="tabela">
<thead>
<tr>
<th>Estúdio</th>
<th>Check-in</th>
<th>Check-out</th>
<th>Hóspedes</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
fetch("/admin")
.then(res=>res.json())
.then(data=>{
  const tbody=document.querySelector("tbody");

  data.forEach(item=>{
    const tr=document.createElement("tr");

    tr.innerHTML=`
      <td>${item.estudio}</td>
      <td>${new Date(item.checkin).toLocaleDateString()}</td>
      <td>${new Date(item.checkout).toLocaleDateString()}</td>
      <td>${item.hospedes.length}</td>
    `;

    tbody.appendChild(tr);
  });
});
</script>

</body>
</html>
