<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Check-in Digital | Rosa & Souza</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Poppins', sans-serif;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    margin:0;
    padding:20px;
}
.container{
    max-width:520px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:16px;
    box-shadow:0 15px 35px rgba(0,0,0,0.3);
}
label{
    font-size:12px;
    font-weight:600;
    margin-top:10px;
    display:block;
}
input, select{
    width:100%;
    padding:12px;
    margin-top:5px;
    border-radius:10px;
    border:1px solid #ddd;
    font-size:14px;
    background:#f9f9f9;
}
.card{
    background:#f4f6f9;
    padding:15px;
    border-radius:12px;
    margin-top:15px;
}
button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    margin-top:15px;
    font-weight:600;
    cursor:pointer;
}
.add-btn{ background:#1abc9c; color:white; }
.submit-btn{ background:#2c5364; color:white; }
</style>
</head>

<body>

<div class="container">

<h2 style="text-align:center;">ROSA & SOUZA ADMINISTRADORA DE BENS</h2>

<form id="formCadastro" enctype="multipart/form-data">

<label>Estúdio</label>
<select id="estudio" required>
<option value="">Selecione</option>
<option>Domy Vila Mariana 108</option>
<option>Domy Vila Mariana 211</option>
<option>SETIN REPUBLICA 403</option>
<option>SETIN REPUBLICA 1205</option>
<option>SETIN REPUBLICA 1110</option>
<option>MYONE BROOKLIN 1301</option>
<option>MAISON PERDIZES 506</option>
<option>NAU KLABIN 510</option>
<option>HUB ITAGUA 203</option>
<option>ARYEH TENORIO 103</option>
</select>

<label>Data Check-in</label>
<input type="date" id="checkin" required>

<label>Data Check-out</label>
<input type="date" id="checkout" required>

<div id="pessoasContainer"></div>

<button type="button" class="add-btn" onclick="adicionarPessoa()">Adicionar Hóspede</button>
<button type="submit" class="submit-btn">Fazer Check-in</button>

</form>

<div style="margin-top:30px;text-align:center;">
<p>📱 WhatsApp: <strong>+55 35 99191-0441</strong></p>
<p>📧 Email: <strong>denilsonsouza@me.com</strong></p>
</div>

</div>

<script>

let contador = 0;
const maxPessoas = 6;

function adicionarPessoa(){

    if(contador >= maxPessoas){
        alert("Máximo 6 hóspedes.");
        return;
    }

    contador++;

    const container = document.getElementById("pessoasContainer");

    const repetirEndereco = contador > 1 ? `
        <label>
            <input type="checkbox" onchange="usarMesmoEndereco(this, ${contador})">
            Mesmo endereço do primeiro hóspede
        </label>
    ` : "";

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
        <h4>Hóspede ${contador}</h4>

        <label>Nome Completo</label>
        <input type="text" class="nome" required>

        <label>CEP</label>
        <input type="text" class="cep" required>

        <label>Endereço Completo</label>
        <input type="text" class="endereco" required>

        ${repetirEndereco}

        <label>Celular</label>
        <input type="tel" class="celular" required>

        <label>
            <input type="checkbox" onchange="estrangeiroToggle(this, ${contador})">
            Sou estrangeiro
        </label>

        <div class="cpfArea">
            <label>CPF</label>
            <input type="text" class="cpf">
        </div>

        <div class="passaporteArea" style="display:none;">
            <label>Número do Passaporte</label>
            <input type="text" class="passaporte">

            <label>País</label>
            <select class="pais">
                <option value="">Selecione o país</option>
                <option>Brasil</option>
                <option>Argentina</option>
                <option>Chile</option>
                <option>Estados Unidos</option>
                <option>Portugal</option>
                <option>Espanha</option>
                <option>França</option>
                <option>Alemanha</option>
                <option>Itália</option>
                <option>Japão</option>
                <option>China</option>
                <option>Canadá</option>
                <option>Reino Unido</option>
                <option>Outro</option>
            </select>
        </div>

        <label>Documento (Envie FOTO em JPG ou PNG)</label>
        <input type="file" class="documento" accept=".jpg,.jpeg,.png" required>
    `;

    container.appendChild(card);
}

function usarMesmoEndereco(checkbox, index){

    const cards = document.querySelectorAll(".card");

    if(checkbox.checked){
        const primeiroEndereco = cards[0].querySelector(".endereco").value;
        const primeiroCEP = cards[0].querySelector(".cep").value;

        cards[index-1].querySelector(".endereco").value = primeiroEndereco;
        cards[index-1].querySelector(".cep").value = primeiroCEP;
        cards[index-1].querySelector(".cep").required = false;
    }else{
        cards[index-1].querySelector(".cep").required = true;
    }
}

function estrangeiroToggle(checkbox, index){

    const card = document.querySelectorAll(".card")[index-1];

    const cpfArea = card.querySelector(".cpfArea");
    const passaporteArea = card.querySelector(".passaporteArea");

    if(checkbox.checked){
        cpfArea.style.display = "none";
        passaporteArea.style.display = "block";
    }else{
        cpfArea.style.display = "block";
        passaporteArea.style.display = "none";
    }
}

adicionarPessoa();

</script>

</body>
</html>
