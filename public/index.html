<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Check-in Digital | Rosa & Souza</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Poppins', sans-serif;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    margin:0;
    padding:20px;
}
.container{
    max-width:520px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:16px;
    box-shadow:0 15px 35px rgba(0,0,0,0.3);
}
label{
    font-size:12px;
    font-weight:600;
    margin-top:10px;
    display:block;
}
input, select{
    width:100%;
    padding:12px;
    margin-top:5px;
    border-radius:10px;
    border:1px solid #ddd;
    font-size:14px;
    background:#f9f9f9;
}
.card{
    background:#f4f6f9;
    padding:15px;
    border-radius:12px;
    margin-top:15px;
}
button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    margin-top:15px;
    font-weight:600;
    cursor:pointer;
}
.add-btn{ background:#1abc9c; color:white; }
.submit-btn{ background:#2c5364; color:white; }

.aviso{
    background:#ffe5e5;
    border:2px solid red;
    color:#b00000;
    padding:15px;
    border-radius:10px;
    font-size:14px;
    margin-top:15px;
    text-align:center;
    font-weight:600;
}
</style>
</head>

<body>

<div class="container">

<h2 style="text-align:center;">ROSA & SOUZA ADMINISTRADORA DE BENS</h2>

<form id="formCadastro" enctype="multipart/form-data">

<label>Estúdio</label>
<select id="estudio" required>
<option value="">Selecione</option>
<option>Domy Vila Mariana 108</option>
<option>Domy Vila Mariana 211</option>
<option>SETIN REPUBLICA 403</option>
<option>SETIN REPUBLICA 1205</option>
<option>SETIN REPUBLICA 1110</option>
<option>MYONE BROOKLIN 1301</option>
<option>MAISON PERDIZES 506</option>
<option>NAU KLABIN 510</option>
<option>HUB ITAGUA 203</option>
<option>ARYEH TENORIO 103</option>
</select>

<label>Data Check-in</label>
<input type="date" id="checkin" required>

<label>Data Check-out</label>
<input type="date" id="checkout" required>

<div id="pessoasContainer"></div>

<button type="button" class="add-btn" onclick="adicionarPessoa()">Adicionar Hóspede</button>
<button type="submit" class="submit-btn">Fazer Check-in</button>

</form>

<div style="margin-top:30px;text-align:center;">
<p>📱 WhatsApp: <strong>+55 35 99191-0441</strong></p>
<p>📧 Email: <strong>denilsonsouza@me.com</strong></p>
</div>

</div>

<script>

let contador = 0;
const maxPessoas = 6;

function adicionarPessoa(){

    if(contador >= maxPessoas){
        alert("Máximo 6 hóspedes.");
        return;
    }

    contador++;

    const container = document.getElementById("pessoasContainer");

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
        <h4>Hóspede ${contador}</h4>

        <label>Nome Completo</label>
        <input type="text" class="nome" required>

        <label>Celular</label>
        <input type="tel" class="celular" required>

        <div class="aviso">
        ⚠️ ATENÇÃO: NÃO ACEITAMOS DOCUMENTO EM PDF.<br>
        Envie uma FOTO do documento (RG, CNH ou Passaporte) no formato JPG ou PNG.
        </div>

        <label>Documento (Envie FOTO em JPG ou PNG)</label>
        <input type="file" class="documento" accept=".jpg,.jpeg,.png" required>
    `;

    container.appendChild(card);
}

adicionarPessoa();

</script>

</body>
</html>
