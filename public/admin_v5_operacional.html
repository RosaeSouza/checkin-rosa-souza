<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Operacional V5 | Rosa & Souza</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Poppins', sans-serif;
    background:#f4f6f9;
    margin:0;
    padding:15px;
}
.container{
    max-width:750px;
    margin:auto;
}
h2{
    text-align:center;
    margin-bottom:10px;
}
.section{
    background:white;
    padding:15px;
    border-radius:12px;
    margin-bottom:20px;
    box-shadow:0 4px 10px rgba(0,0,0,0.05);
}
.estudio-btn{
    width:100%;
    padding:16px;
    margin-bottom:10px;
    border:none;
    border-radius:10px;
    background:#2c5364;
    color:white;
    font-weight:600;
    cursor:pointer;
}
.card{
    background:white;
    padding:14px;
    border-radius:10px;
    margin-bottom:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.05);
}
.copy-btn{
    background:#3498db;
    color:white;
    border:none;
    border-radius:6px;
    padding:4px 8px;
    font-size:11px;
    margin-left:6px;
    cursor:pointer;
}
.btn{
    width:100%;
    padding:12px;
    margin-top:8px;
    border:none;
    border-radius:8px;
    font-weight:600;
    cursor:pointer;
}
.btn-green{ background:#27ae60; color:white; }
.btn-red{ background:#e74c3c; color:white; }
.btn-gray{ background:#7f8c8d; color:white; }
.btn-primary{ background:#2c5364; color:white; }
input{
    width:100%;
    padding:8px;
    margin-top:5px;
    border-radius:6px;
    border:1px solid #ccc;
}
.hidden{ display:none; }
</style>
</head>

<body>

<div class="container">

<h2>Painel Operacional</h2>

<div class="section" id="dashboard"></div>

<button class="btn btn-primary" onclick="toggleLimpeza()">LIMPEZA</button>

<div id="limpezaSection" class="hidden"></div>

<div class="section" id="estudiosSection"></div>
<div id="reservasSection" class="hidden"></div>

</div>

<script>

let todosDados = [];
let valorLimpeza = localStorage.getItem("valorLimpeza") || 120;
let pagamentos = JSON.parse(localStorage.getItem("pagamentosLimpeza") || "[]");

fetch("/admin")
.then(res=>res.json())
.then(data=>{
    todosDados = data;
    renderDashboard();
    renderEstudios();
});

/* ---------------- DASHBOARD ---------------- */

function renderDashboard(){
    const hoje = new Date();
    hoje.setHours(0,0,0,0);

    const seteDias = new Date();
    seteDias.setDate(hoje.getDate()+7);

    const hojeLista = todosDados.filter(r=>{
        const d=new Date(r.checkout);
        d.setHours(0,0,0,0);
        return d.getTime()===hoje.getTime();
    });

    const proximos = todosDados.filter(r=>{
        const d=new Date(r.checkout);
        return d>hoje && d<=seteDias;
    }).sort((a,b)=>new Date(a.checkout)-new Date(b.checkout));

    let html="<h3>📅 Check-outs Hoje</h3>";

    if(hojeLista.length===0){
        html+="<p>Nenhum hoje.</p>";
    }else{
        hojeLista.forEach(r=>{
            html+=`<div><strong>${r.estudio}</strong> — ${r.hospedes[0].nome}</div>`;
        });
    }

    html+="<h3 style='margin-top:15px;'>📅 Próximos 7 dias</h3>";

    if(proximos.length===0){
        html+="<p>Nenhum nos próximos 7 dias.</p>";
    }else{
        proximos.forEach(r=>{
            html+=`<div>${formatarData(r.checkout)} — <strong>${r.estudio}</strong> — ${r.hospedes[0].nome}</div>`;
        });
    }

    document.getElementById("dashboard").innerHTML=html;
}

/* ---------------- ESTÚDIOS ---------------- */

function renderEstudios(){
    const sec=document.getElementById("estudiosSection");
    sec.innerHTML="<h3>Estúdios</h3>";

    const estudios=[...new Set(todosDados.map(r=>r.estudio))];

    estudios.forEach(est=>{
        const btn=document.createElement("button");
        btn.className="estudio-btn";
        btn.innerText=est;
        btn.onclick=()=>abrirEstudio(est);
        sec.appendChild(btn);
    });
}

function abrirEstudio(est){
    const reservas=todosDados.filter(r=>r.estudio===est);
    const sec=document.getElementById("reservasSection");
    sec.classList.remove("hidden");
    sec.innerHTML=`<h3>${est}</h3><button class="btn btn-gray" onclick="fecharReservas()">Fechar</button>`;

    reservas.forEach(r=>{
        const doc=r.hospedes[0];
        sec.innerHTML+=`
        <div class="card">
        <div><strong>Nome:</strong> ${doc.nome}
        <button class="copy-btn" onclick="copiar('${doc.nome}')">Copiar</button></div>
        <div><strong>CPF:</strong> ${doc.cpf||"-"}
        ${doc.cpf?`<button class="copy-btn" onclick="copiar('${doc.cpf}')">Copiar</button>`:""}</div>
        <div><strong>Passaporte:</strong> ${doc.passaporte||"-"}
        ${doc.passaporte?`<button class="copy-btn" onclick="copiar('${doc.passaporte}')">Copiar</button>`:""}</div>
        <div><strong>Entrada:</strong> ${formatarData(r.checkin)}</div>
        <div><strong>Saída:</strong> ${formatarData(r.checkout)}</div>
        ${doc.documentoUrl?`<a href="${doc.documentoUrl}" target="_blank"><button class="btn btn-green">Ver Documento</button></a>`:""}
        <button class="btn btn-red" onclick="excluir('${r._id}')">Excluir</button>
        </div>`;
    });
}

function fecharReservas(){
    document.getElementById("reservasSection").classList.add("hidden");
}

/* ---------------- LIMPEZA ---------------- */

function toggleLimpeza(){
    const sec=document.getElementById("limpezaSection");
    if(sec.classList.contains("hidden")){
        sec.classList.remove("hidden");
        renderLimpeza();
    }else{
        sec.classList.add("hidden");
    }
}

function renderLimpeza(){
    const hoje=new Date();
    const mes=hoje.getMonth();
    const ano=hoje.getFullYear();

    const realizadas=todosDados.filter(r=>{
        const d=new Date(r.checkout);
        return d<hoje && d.getMonth()===mes && d.getFullYear()===ano;
    });

    const total=realizadas.length;
    const devido=total*valorLimpeza;
    const pago=pagamentos.reduce((a,b)=>a+Number(b),0);
    const saldo=devido-pago;

    document.getElementById("limpezaSection").innerHTML=`
    <div class="section">
    <h3>🧹 Controle de Limpeza</h3>
    <p>Limpezas realizadas no mês: ${total}</p>
    <label>Valor por limpeza</label>
    <input type="number" value="${valorLimpeza}" onchange="atualizarValor(this.value)">
    <p>Total devido: R$ ${devido.toFixed(2)}</p>
    <p>Total pago: R$ ${pago.toFixed(2)}</p>
    <p><strong>Saldo: R$ ${saldo.toFixed(2)}</strong></p>
    <label>Registrar pagamento</label>
    <input type="number" id="novoPagamento">
    <button class="btn btn-green" onclick="registrarPagamento()">Registrar</button>
    </div>`;
}

function atualizarValor(v){
    valorLimpeza=Number(v);
    localStorage.setItem("valorLimpeza",valorLimpeza);
    renderLimpeza();
}

function registrarPagamento(){
    const v=document.getElementById("novoPagamento").value;
    if(!v) return;
    pagamentos.push(Number(v));
    localStorage.setItem("pagamentosLimpeza",JSON.stringify(pagamentos));
    renderLimpeza();
}

/* ---------------- UTIL ---------------- */

function copiar(t){
    navigator.clipboard.writeText(t).then(()=>alert("Copiado!"));
}

function excluir(id){
    if(!confirm("Excluir reserva?")) return;
    fetch("/checkin/"+id,{method:"DELETE"})
    .then(()=>location.reload());
}

function formatarData(dataISO){
    const partes = dataISO.split("-");
    return `${partes[2]}/${partes[1]}/${partes[0]}`;
}

</script>

</body>
</html>
