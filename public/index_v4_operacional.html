<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Check-in Digital | Rosa & Souza</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Poppins', sans-serif;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    margin:0;
    padding:20px;
}
.container{
    max-width:520px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:16px;
    box-shadow:0 15px 35px rgba(0,0,0,0.3);
}
h2{text-align:center;}
label{
    font-size:12px;
    font-weight:600;
    margin-top:10px;
    display:block;
}
input, select{
    width:100%;
    padding:12px;
    margin-top:5px;
    border-radius:10px;
    border:1px solid #ddd;
    font-size:14px;
    background:#f9f9f9;
}
.card{
    background:#f4f6f9;
    padding:15px;
    border-radius:12px;
    margin-top:15px;
    position:relative;
}
.remove-btn{
    position:absolute;
    top:12px;
    right:12px;
    background:#e74c3c;
    color:white;
    border:none;
    border-radius:20px;
    padding:4px 10px;
    font-size:10px;
    font-weight:600;
    cursor:pointer;
    width:auto;
}
button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    margin-top:15px;
    font-weight:600;
    cursor:pointer;
}
.add-btn{ background:#1abc9c; color:white; }
.submit-btn{ background:#2c5364; color:white; }

.aviso{
    background:#ffe5e5;
    border:2px solid red;
    color:#b00000;
    padding:12px;
    border-radius:10px;
    font-size:13px;
    margin-top:10px;
    text-align:center;
    font-weight:600;
}

.regras{
    display:none;
    margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

<h2>ROSA & SOUZA ADMINISTRADORA DE BENS</h2>

<form id="formCadastro" enctype="multipart/form-data">

<label>Estúdio</label>
<select name="estudio" required>
<option value="">Selecione</option>
<option>O melhor do Brooklin 1301</option>
<option>Superior Vila Mariana 211</option>
<option>Superior Praça da Republica 1205</option>
<option>Setin Downtown Republica 403</option>
<option>O Melhor da Vila Mariana 108</option>
<option>Luxo Setin Republica 1110</option>
<option>Maison Allianz 506</option>
<option>NAU Klabin 510</option>
<option>HUB Itagua 203</option>
<option>Aryeh Tenorio 103</option>
</select>

<label>Data Check-in</label>
<input type="date" name="checkin" required>

<label>Data Check-out</label>
<input type="date" name="checkout" required>

<div id="pessoasContainer"></div>

<button type="button" class="add-btn" onclick="adicionarPessoa()">Adicionar Hóspede</button>
<button type="submit" class="submit-btn">Fazer Check-in</button>

</form>

<div class="regras" id="telaRegras">
<h3>Regras da Casa</h3>
<ul>
<li>🚭 NÃO É PERMITIDO FUMAR NO ESTÚDIO</li>
<li>🔇 RESPEITAR A LEI DO SILÊNCIO</li>
<li>🚫 NÃO É PERMITIDO RECEBER VISITAS NÃO CADASTRADAS</li>
<li>⏰ RESPEITAR O HORÁRIO DE CHECK-OUT</li>
<li>💰 DANOS SERÃO COBRADOS À PARTE</li>
<li>🐶 NÃO É PERMITIDO PETS</li>
</ul>

<label style="margin-top:15px;">
<input type="checkbox" id="lgpdCheck">
CONCORDO COM O USO DOS MEUS DADOS CONFORME A LGPD.
</label>

<button onclick="finalizar()">Concluir Check-in</button>
</div>

</div>

<script>

let contador = 0;
let dadosForm;
const maxPessoas = 6;

function validarCPF(cpf){
    cpf = cpf.replace(/[^\d]+/g,'');
    if(cpf.length !== 11 || /^(\d)\1+$/.test(cpf)) return false;
    let soma=0;
    for(let i=0;i<9;i++) soma+=parseInt(cpf.charAt(i))*(10-i);
    let resto=11-(soma%11);
    if(resto>=10) resto=0;
    if(resto!=parseInt(cpf.charAt(9))) return false;
    soma=0;
    for(let i=0;i<10;i++) soma+=parseInt(cpf.charAt(i))*(11-i);
    resto=11-(soma%11);
    if(resto>=10) resto=0;
    if(resto!=parseInt(cpf.charAt(10))) return false;
    return true;
}

function adicionarPessoa(){
    if(document.querySelectorAll(".card").length>=maxPessoas){
        alert("Máximo 6 hóspedes.");
        return;
    }

    contador++;
    const container=document.getElementById("pessoasContainer");

    const card=document.createElement("div");
    card.className="card";

    card.innerHTML=`
        <button type="button" class="remove-btn" onclick="this.parentElement.remove()">Excluir</button>
        <h4 style="margin-right:60px;">Hóspede</h4>

        <label>Nome Completo</label>
        <input type="text" class="nome" required>

        <label>
        <input type="checkbox" onchange="toggleEstrangeiro(this)">
        Sou estrangeiro
        </label>

        <div class="brasileiro">
            <label>CPF</label>
            <input type="text" class="cpf">

            <label>CEP</label>
            <input type="text" class="cep">

            <label>Endereço</label>
            <input type="text" class="endereco">
        </div>

        <div class="estrangeiro" style="display:none;">
            <label>Passaporte</label>
            <input type="text" class="passaporte">

            <label>País</label>
            <input type="text" class="pais">
        </div>

        <div class="aviso">
        ⚠️ NÃO ACEITAMOS DOCUMENTO EM PDF. Envie FOTO em JPG ou PNG.
        </div>

        <label>Documento</label>
        <input type="file" name="documento" accept=".jpg,.jpeg,.png" required>
    `;

    container.appendChild(card);
}

function toggleEstrangeiro(checkbox){
    const card = checkbox.closest(".card");
    const brasileiro = card.querySelector(".brasileiro");
    const estrangeiro = card.querySelector(".estrangeiro");

    if(checkbox.checked){
        brasileiro.style.display="none";
        estrangeiro.style.display="block";
    }else{
        brasileiro.style.display="block";
        estrangeiro.style.display="none";
    }
}

adicionarPessoa();

document.getElementById("formCadastro").addEventListener("submit",function(e){
    e.preventDefault();

    dadosForm = new FormData(this);
    const hospedes = [];
    const cards = document.querySelectorAll(".card");

    for(let card of cards){

        const estrangeiroAtivo = card.querySelector(".estrangeiro").style.display !== "none";

        if(estrangeiroAtivo){
            const passaporte = card.querySelector(".passaporte").value;
            const pais = card.querySelector(".pais").value;
            if(!passaporte || !pais){
                alert("Passaporte e País são obrigatórios para estrangeiros.");
                return;
            }
        }else{
            const cpf = card.querySelector(".cpf").value;
            const cep = card.querySelector(".cep").value;
            const endereco = card.querySelector(".endereco").value;

            if(!validarCPF(cpf)){
                alert("CPF inválido.");
                return;
            }
            if(!cep || !endereco){
                alert("CEP e Endereço são obrigatórios.");
                return;
            }
        }

        hospedes.push({
            nome: card.querySelector(".nome").value,
            cpf: estrangeiroAtivo ? "" : card.querySelector(".cpf").value,
            cep: estrangeiroAtivo ? "" : card.querySelector(".cep").value,
            endereco: estrangeiroAtivo ? "" : card.querySelector(".endereco").value,
            passaporte: estrangeiroAtivo ? card.querySelector(".passaporte").value : "",
            pais: estrangeiroAtivo ? card.querySelector(".pais").value : ""
        });
    }

    dadosForm.append("hospedes", JSON.stringify(hospedes));

    document.getElementById("formCadastro").style.display="none";
    document.getElementById("telaRegras").style.display="block";
});

function finalizar(){
    if(!document.getElementById("lgpdCheck").checked){
        alert("Você deve concordar com a LGPD.");
        return;
    }

    fetch("/checkin",{ method:"POST", body:dadosForm })
    .then(res=>{
        if(!res.ok) throw new Error();
        return res.json();
    })
    .then(()=>{
        alert("Check-in salvo com sucesso!");
        location.reload();
    })
    .catch(()=>{
        alert("Erro ao salvar check-in.");
    });
}

</script>

</body>
</html>
