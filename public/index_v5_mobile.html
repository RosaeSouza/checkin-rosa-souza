<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Check-in Digital | Rosa & Souza</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Poppins', sans-serif;
    background:#f4f6f9;
    margin:0;
    padding:15px;
}

.container{
    max-width:520px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:14px;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

h2{
    text-align:center;
    font-size:18px;
    margin-bottom:20px;
    color:#2c3e50;
}

label{
    font-size:13px;
    font-weight:500;
    margin-top:12px;
    display:block;
    color:#34495e;
}

input, select{
    width:100%;
    padding:14px;
    margin-top:6px;
    border-radius:10px;
    border:1px solid #e0e0e0;
    font-size:16px;
    background:#fafafa;
    box-sizing:border-box;
}

input:focus, select:focus{
    outline:none;
    border:1px solid #2c5364;
    background:white;
}

.card{
    background:#f9fbfd;
    padding:18px;
    border-radius:12px;
    margin-top:18px;
    position:relative;
}

.remove-btn{
    position:absolute;
    top:12px;
    right:12px;
    background:#e74c3c;
    color:white;
    border:none;
    border-radius:20px;
    padding:4px 10px;
    font-size:11px;
    font-weight:600;
    cursor:pointer;
    width:auto;
}

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:12px;
    margin-top:18px;
    font-weight:600;
    font-size:15px;
    cursor:pointer;
}

.add-btn{ background:#1abc9c; color:white; }
.submit-btn{ background:#2c5364; color:white; }

.aviso{
    background:#fff4f4;
    border:1px solid #ffcccc;
    color:#c0392b;
    padding:10px;
    border-radius:8px;
    font-size:12px;
    margin-top:12px;
    text-align:center;
}

.regras{
    display:none;
    margin-top:25px;
}

.regras h3{
    text-align:center;
    margin-bottom:10px;
}

.regras ul{
    font-size:13px;
    padding-left:18px;
    line-height:1.6;
}

.lgpd-box{
    margin-top:15px;
    font-size:13px;
}
</style>
</head>

<body>

<div class="container">

<h2>ROSA & SOUZA ADMINISTRADORA DE BENS</h2>

<form id="formCadastro" enctype="multipart/form-data">

<label>Estúdio</label>
<select name="estudio" required>
<option value="">Selecione</option>
<option>O melhor do Brooklin 1301</option>
<option>Superior Vila Mariana 211</option>
<option>Superior Praça da Republica 1205</option>
<option>Setin Downtown Republica 403</option>
<option>O Melhor da Vila Mariana 108</option>
<option>Luxo Setin Republica 1110</option>
<option>Maison Allianz 506</option>
<option>NAU Klabin 510</option>
<option>HUB Itagua 203</option>
<option>Aryeh Tenorio 103</option>
</select>

<label>Data Check-in</label>
<input type="date" name="checkin" required>

<label>Data Check-out</label>
<input type="date" name="checkout" required>

<div id="pessoasContainer"></div>

<button type="button" class="add-btn" onclick="adicionarPessoa()">Adicionar Hóspede</button>
<button type="submit" class="submit-btn">Fazer Check-in</button>

</form>

<div class="regras" id="telaRegras">
<h3>Regras da Casa</h3>
<ul>
<li>Não é permitido fumar no estúdio</li>
<li>Respeitar a lei do silêncio</li>
<li>Não receber visitas não cadastradas</li>
<li>Respeitar horário de check-out</li>
<li>Danos serão cobrados</li>
<li>Não é permitido pets</li>
</ul>

<div class="lgpd-box">
<input type="checkbox" id="lgpdCheck">
 Concordo com o uso dos meus dados conforme LGPD.
</div>

<button onclick="finalizar()">Concluir Check-in</button>
</div>

</div>

<script>

let dadosForm;
const maxPessoas = 6;

function validarCPF(cpf){
    cpf = cpf.replace(/[^\d]+/g,'');
    if(cpf.length !== 11 || /^(\d)\1+$/.test(cpf)) return false;
    let soma=0;
    for(let i=0;i<9;i++) soma+=parseInt(cpf.charAt(i))*(10-i);
    let resto=11-(soma%11);
    if(resto>=10) resto=0;
    if(resto!=parseInt(cpf.charAt(9))) return false;
    soma=0;
    for(let i=0;i<10;i++) soma+=parseInt(cpf.charAt(i))*(11-i);
    resto=11-(soma%11);
    if(resto>=10) resto=0;
    if(resto!=parseInt(cpf.charAt(10))) return false;
    return true;
}

function mascaraCPF(input){
    input.value = input.value
        .replace(/\D/g,"")
        .replace(/(\d{3})(\d)/,"$1.$2")
        .replace(/(\d{3})(\d)/,"$1.$2")
        .replace(/(\d{3})(\d{1,2})$/,"$1-$2");
}

function mascaraCEP(input){
    input.value = input.value
        .replace(/\D/g,"")
        .replace(/(\d{5})(\d)/,"$1-$2");
}

function adicionarPessoa(){
    if(document.querySelectorAll(".card").length>=maxPessoas){
        alert("Máximo 6 hóspedes.");
        return;
    }

    const container=document.getElementById("pessoasContainer");

    const card=document.createElement("div");
    card.className="card";

    card.innerHTML=`
        <button type="button" class="remove-btn" onclick="this.parentElement.remove()">Excluir</button>

        <label>Nome Completo</label>
        <input type="text" class="nome" required>

        <label>CPF</label>
        <input type="tel" inputmode="numeric" class="cpf" oninput="mascaraCPF(this)">

        <label>CEP</label>
        <input type="tel" inputmode="numeric" class="cep" oninput="mascaraCEP(this)">

        <label>Endereço</label>
        <input type="text" class="endereco">

        <div class="aviso">
        Não aceitamos documento em PDF. Envie foto em JPG ou PNG.
        </div>

        <label>Documento</label>
        <input type="file" name="documento" accept=".jpg,.jpeg,.png" required>
    `;

    container.appendChild(card);
}

adicionarPessoa();

document.getElementById("formCadastro").addEventListener("submit",function(e){
    e.preventDefault();

    dadosForm = new FormData(this);
    const hospedes = [];
    const cards = document.querySelectorAll(".card");

    for(let card of cards){

        const cpf = card.querySelector(".cpf").value;
        if(!validarCPF(cpf)){
            alert("CPF inválido.");
            return;
        }

        hospedes.push({
            nome: card.querySelector(".nome").value,
            cpf: cpf,
            cep: card.querySelector(".cep").value,
            endereco: card.querySelector(".endereco").value,
            passaporte: "",
            pais: ""
        });
    }

    dadosForm.append("hospedes", JSON.stringify(hospedes));

    document.getElementById("formCadastro").style.display="none";
    document.getElementById("telaRegras").style.display="block";
});

function finalizar(){
    if(!document.getElementById("lgpdCheck").checked){
        alert("Você deve concordar com a LGPD.");
        return;
    }

    fetch("/checkin",{ method:"POST", body:dadosForm })
    .then(res=>{
        if(!res.ok) throw new Error();
        return res.json();
    })
    .then(()=>{
        alert("Check-in salvo com sucesso!");
        location.reload();
    })
    .catch(()=>{
        alert("Erro ao salvar check-in.");
    });
}

</script>

</body>
</html>
