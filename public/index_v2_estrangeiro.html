<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Check-in Digital | Rosa & Souza</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Poppins', sans-serif;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    margin:0;
    padding:20px;
}
.container{
    max-width:520px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:16px;
    box-shadow:0 15px 35px rgba(0,0,0,0.3);
}
h2{text-align:center;}
label{
    font-size:12px;
    font-weight:600;
    margin-top:10px;
    display:block;
}
input, select{
    width:100%;
    padding:12px;
    margin-top:5px;
    border-radius:10px;
    border:1px solid #ddd;
    font-size:14px;
    background:#f9f9f9;
}
.card{
    background:#f4f6f9;
    padding:15px;
    border-radius:12px;
    margin-top:15px;
}
button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    margin-top:15px;
    font-weight:600;
    cursor:pointer;
}
.add-btn{ background:#1abc9c; color:white; }
.submit-btn{ background:#2c5364; color:white; }

.aviso{
    background:#ffe5e5;
    border:2px solid red;
    color:#b00000;
    padding:12px;
    border-radius:10px;
    font-size:13px;
    margin-top:10px;
    text-align:center;
    font-weight:600;
}

.regras{
    display:none;
    margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

<h2>ROSA & SOUZA ADMINISTRADORA DE BENS</h2>

<form id="formCadastro" enctype="multipart/form-data">

<label>Estúdio</label>
<select name="estudio" required>
<option value="">Selecione</option>
<option>Domy Vila Mariana 108</option>
<option>Domy Vila Mariana 211</option>
<option>SETIN REPUBLICA 403</option>
<option>SETIN REPUBLICA 1205</option>
<option>SETIN REPUBLICA 1110</option>
<option>MYONE BROOKLIN 1301</option>
<option>MAISON PERDIZES 506</option>
<option>NAU KLABIN 510</option>
<option>HUB ITAGUA 203</option>
<option>ARYEH TENORIO 103</option>
</select>

<label>Data Check-in</label>
<input type="date" name="checkin" required>

<label>Data Check-out</label>
<input type="date" name="checkout" required>

<div id="pessoasContainer"></div>

<button type="button" class="add-btn" onclick="adicionarPessoa()">Adicionar Hóspede</button>
<button type="submit" class="submit-btn">Fazer Check-in</button>

</form>

<div class="regras" id="telaRegras">
<h3>Regras da Casa</h3>
<ul>
<li>🚭 NÃO É PERMITIDO FUMAR NO ESTÚDIO</li>
<li>🔇 RESPEITAR A LEI DO SILÊNCIO</li>
<li>🚫 NÃO É PERMITIDO RECEBER VISITAS NÃO CADASTRADAS</li>
<li>⏰ RESPEITAR O HORÁRIO DE CHECK-OUT</li>
<li>💰 DANOS SERÃO COBRADOS À PARTE</li>
<li>🐶 NÃO É PERMITIDO PETS</li>
</ul>

<label style="margin-top:15px;">
<input type="checkbox" id="lgpdCheck">
CONCORDO COM O USO DOS MEUS DADOS CONFORME A LGPD.
</label>

<button onclick="finalizar()">Concluir Check-in</button>
</div>

</div>

<script>

let contador = 0;
const maxPessoas = 6;

function adicionarPessoa(){
    if(contador>=maxPessoas){
        alert("Máximo 6 hóspedes.");
        return;
    }

    contador++;
    const container=document.getElementById("pessoasContainer");

    const repetir=contador>1?`
    <label>
    <input type="checkbox" onchange="usarMesmoEndereco(this,${contador})">
    Mesmo endereço do primeiro hóspede
    </label>`:"";

    const card=document.createElement("div");
    card.className="card";
    card.innerHTML=`
        <h4>Hóspede ${contador}</h4>

        <label>Nome Completo</label>
        <input type="text" class="nome" required>

        <label>
        <input type="checkbox" onchange="toggleEstrangeiro(this,${contador})">
        Sou estrangeiro
        </label>

        <div id="brasileiro_${contador}">
            <label>CPF</label>
            <input type="text" class="cpf">
            <label>CEP</label>
            <input type="text" id="cep_${contador}">
            <label>Endereço</label>
            <input type="text" id="endereco_${contador}">
        </div>

        <div id="estrangeiro_${contador}" style="display:none;">
            <label>Passaporte</label>
            <input type="text" class="passaporte">
            <label>País</label>
            <select class="pais">
                <option value="">Selecione</option>
                <option>Argentina</option>
                <option>Estados Unidos</option>
                <option>Portugal</option>
                <option>Espanha</option>
                <option>França</option>
                <option>Alemanha</option>
                <option>Itália</option>
                <option>Japão</option>
                <option>China</option>
                <option>Outro</option>
            </select>
        </div>

        ${repetir}

        <div class="aviso">
        ⚠️ NÃO ACEITAMOS DOCUMENTO EM PDF. Envie FOTO em JPG ou PNG.
        </div>

        <label>Documento</label>
        <input type="file" name="documento" accept=".jpg,.jpeg,.png" required>
    `;

    container.appendChild(card);
}

function toggleEstrangeiro(checkbox,index){
    const brasileiro=document.getElementById("brasileiro_"+index);
    const estrangeiro=document.getElementById("estrangeiro_"+index);

    if(checkbox.checked){
        brasileiro.style.display="none";
        estrangeiro.style.display="block";
    }else{
        brasileiro.style.display="block";
        estrangeiro.style.display="none";
    }
}

function usarMesmoEndereco(checkbox,index){
    if(checkbox.checked){
        document.getElementById("cep_"+index).disabled=true;
        document.getElementById("endereco_"+index).value=
        document.getElementById("endereco_1").value;
    }else{
        document.getElementById("cep_"+index).disabled=false;
    }
}

adicionarPessoa();

let dadosForm;

document.getElementById("formCadastro").addEventListener("submit",function(e){
    e.preventDefault();
    dadosForm = new FormData(this);
    document.getElementById("formCadastro").style.display="none";
    document.getElementById("telaRegras").style.display="block";
});

function finalizar(){
    if(!document.getElementById("lgpdCheck").checked){
        alert("Você deve concordar com a LGPD.");
        return;
    }

    fetch("/checkin",{ method:"POST", body:dadosForm })
    .then(res=>res.json())
    .then(()=>{
        alert("Check-in salvo com sucesso!");
        location.reload();
    })
    .catch(()=>{
        alert("Erro ao salvar.");
    });
}

</script>

</body>
</html>
